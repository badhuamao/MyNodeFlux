name: 节点清单自动更新

on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时运行一次 (UTC 时间)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开启写入权限

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 执行清单采集脚本
        run: python update_links.py

      - name: 提交并推送到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add targets.txt
          # 只有当文件确实有变化时才提交，避免产生无意义的 commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新详情页清单: $(date +'%Y-%m-%d %H:%M')" && git push)

      - name: 清理过往运行记录 (可选)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3
